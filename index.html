<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Hiểu Thêm Về Bạo Lực Học Đường</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            /* Thay đổi overflow để tránh bị đứng trang trên một số trình duyệt mobile */
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            height: 100vh;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #app-container {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Menu chính */
        .menu-container {
            text-align: center;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.75);
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            z-index: 10;
            width: 90%;
            max-width: 500px; /* Giới hạn độ rộng trên máy tính */
        }

        .menu-container.slide-out {
            transform: translateX(-150%) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        h2 {
            font-size: 1.5rem; /* Giảm size tiêu đề một chút cho mobile */
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .option-btn {
            display: block;
            width: 100%;
            margin: 10px auto;
            padding: 15px 20px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            box-sizing: border-box; /* Đảm bảo padding không làm tràn nút */
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4da6ff;
            transform: translateX(10px);
            color: #fff;
        }

        .option-btn i {
            margin-right: 12px;
            color: #4da6ff;
            width: 20px;
            text-align: center;
        }

        /* KHUNG CỬA SỔ THÔNG TIN */
        #content-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(150%, -50%);
            width: 90%; 
            height: 85vh; /* Cố định chiều cao để scroll bên trong */
            max-width: 1000px;
            background: rgba(10, 10, 10, 0.98);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 80px rgba(0,0,0,1);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #content-wrapper.active {
            transform: translate(-50%, -50%);
            opacity: 1;
        }

        #content-title {
            font-size: 1.6rem;
            margin: 0;
            color: #4da6ff;
            border-bottom: 2px solid rgba(77, 166, 255, 0.2);
            padding-bottom: 15px;
        }

        .scrollable-content {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 15px;
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #f0f0f0;
            white-space: pre-wrap;
            text-align: justify;
        }

        /* ẢNH PHẢN HỒI (RESPONSIVE IMAGE) */
        .content-image {
            display: block;
            width: 100%;
            max-width: 500px; /* Thu nhỏ ảnh trên PC */
            height: auto;
            margin: 20px auto;
            border-radius: 12px;
        }

        .back-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
            width: fit-content;
        }

        /* --- MEDIA QUERIES CHO MÁY TÍNH (MÀN HÌNH LỚN) --- */
        @media (min-width: 768px) {
            h2 { font-size: 2rem; }
            .option-btn { font-size: 1.2rem; padding: 20px 25px; }
            #content-title { font-size: 2.2rem; }
            .scrollable-content { font-size: 1.35rem; padding-right: 25px; }
            #content-wrapper { padding: 50px; }
            .back-btn { font-size: 1rem; }
        }

        /* Định dạng đặc biệt */
        .custom-bold { font-weight: 800; color: #fff; }
        .custom-highlight { background: #0056b3; padding: 2px 8px; border-radius: 4px; }

        /* Scrollbar */
        .scrollable-content::-webkit-scrollbar { width: 6px; }
        .scrollable-content::-webkit-scrollbar-thumb { background: #4da6ff; border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="app-container">
    <div class="menu-container" id="menu">
        <h2><i class="fas fa-shield-alt"></i> TÌM HIỂU VỀ</h2>
        
        <button class="option-btn" onclick="fetchAndShow('now.txt', 'Hiện trạng')">
            <i class="fas fa-bullhorn"></i> Hiện trạng bạo lực
        </button>
        
        <button class="option-btn" onclick="fetchAndShow('why.txt', 'Nguyên nhân')">
            <i class="fas fa-brain"></i> Nguyên nhân bạo lực
        </button>
        
        <button class="option-btn" onclick="fetchAndShow('giaiphap.txt', 'Giải pháp')">
            <i class="fas fa-hand-holding-heart"></i> Giải pháp khắc phục
        </button>
        
        <button class="option-btn" onclick="fetchAndShow('dienramai.txt', 'Hệ quả')">
            <i class="fas fa-clock"></i> Sẽ ra sao nếu kéo dài?
        </button>
        
        <button class="option-btn" onclick="fetchAndShow('kobaoluc.txt', 'Lý tưởng')">
            <i class="fas fa-sun"></i> Môi trường không bạo lực
        </button>
    </div>

    <div id="content-wrapper">
        <h2 id="content-title"></h2>
        <div id="text-body" class="scrollable-content"></div>
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> QUAY LẠI</button>
    </div>
</div>

<script>
    /* --- CANVAS BACKGROUND (Giữ nguyên logic nhưng tối ưu hiệu suất) --- */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.6;
            this.vy = (Math.random() - 0.5) * 0.6;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
    }

    function init() {
        particles = [];
        // Giảm số lượng hạt trên điện thoại để mượt hơn
        const count = window.innerWidth < 768 ? 40 : 90;
        for (let i = 0; i < count; i++) particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const linkDist = 120;
        for (let i = 0; i < particles.length; i++) {
            const p1 = particles[i]; p1.update();
            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const dx = p1.x - p2.x, dy = p1.y - p2.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < linkDist) {
                    ctx.strokeStyle = `rgba(255,255,255,${0.5 - dist/linkDist})`;
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animate);
    }
    
    window.addEventListener('resize', resize);
    resize(); animate();

    /* --- LOGIC XỬ LÝ --- */
    const menu = document.getElementById('menu');
    const wrapper = document.getElementById('content-wrapper');
    const textBody = document.getElementById('text-body');
    const titleTag = document.getElementById('content-title');

    function parseContent(text) {
        const imageRegex = /(https?:\/\/[^\s]+?\.(?:jpg|jpeg|png|gif|webp))/gi;
        return text.replace(imageRegex, '<img src="$1" class="content-image" alt="Hình ảnh">')
                   .replace(/\*\*(.*?)\*\*/g, '<span class="custom-bold">$1</span>')
                   .replace(/{{(.*?)}}/g, '<span class="custom-highlight">$1</span>');
    }

    async function fetchAndShow(file, title) {
        menu.classList.add('slide-out');
        try {
            const response = await fetch(file);
            const content = response.ok ? await response.text() : "Dữ liệu đang được cập nhật...";
            titleTag.innerText = title;
            textBody.innerHTML = parseContent(content);
            textBody.scrollTop = 0;
            setTimeout(() => wrapper.classList.add('active'), 300);
        } catch (e) {
            alert("Lỗi kết nối!");
        }
    }

    function goBack() {
        wrapper.classList.remove('active');
        setTimeout(() => menu.classList.remove('slide-out'), 400);
    }
</script>
</body>
</html>
