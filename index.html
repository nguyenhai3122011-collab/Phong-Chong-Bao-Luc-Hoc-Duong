<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thông Tin Bạo Lực Học Đường</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #app-container {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Menu chính */
        .menu-container {
            text-align: center;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .menu-container.slide-out {
            transform: translateX(-150%) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .option-btn {
            display: block;
            width: 100%;
            min-width: 420px;
            margin: 14px auto;
            padding: 18px 25px;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4da6ff;
            transform: translateX(15px);
            color: #fff;
            box-shadow: -5px 0 15px rgba(77, 166, 255, 0.3);
        }

        .option-btn i {
            margin-right: 15px;
            color: #4da6ff;
        }

        /* Khung nội dung */
        #content-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(150%, -50%);
            width: 85%;
            max-width: 900px;
            background: rgba(10, 10, 10, 0.98);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            max-height: 85vh;
        }

        #content-wrapper.active {
            transform: translate(-50%, -50%);
            opacity: 1;
        }

        .scrollable-content {
            overflow-y: auto;
            padding-right: 20px;
            margin: 20px 0;
            font-size: 1.15rem;
            line-height: 1.8;
            color: #ececec;
            white-space: pre-wrap;
            text-align: justify;
        }

        /* Định dạng đặc biệt */
        .custom-bold { font-weight: bold; color: #fff; font-size: 1.2rem; }
        .custom-underline { text-decoration: underline; text-underline-offset: 4px; }
        .custom-highlight { 
            background: linear-gradient(90deg, #0056b3, #007bff);
            padding: 2px 8px; 
            border-radius: 6px; 
            color: white; 
            font-weight: 600;
        }

        /* Hiển thị ảnh */
        .content-image {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 20px auto;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Custom Scrollbar */
        .scrollable-content::-webkit-scrollbar { width: 8px; }
        .scrollable-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .scrollable-content::-webkit-scrollbar-thumb { background: #4da6ff; border-radius: 10px; }

        .back-btn {
            align-self: flex-start;
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 28px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .back-btn:hover { background: #4da6ff; color: white; transform: scale(1.05); }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="app-container">
    <div class="menu-container" id="menu">
        <h2><i class="fas fa-shield-alt"></i> TÌM HIỂU KIẾN THỨC</h2>
        
        <button class="option-btn" onclick="fetchAndShow('now.txt', 'Hiện trạng bạo lực học đường')">
            <i class="fas fa-bullhorn"></i> Hiện trạng của bạo lực học đường
        </button>
        
        <button class="option-btn" onclick="fetchAndShow('why.txt', 'Nguyên nhân bạo lực')">
            <i class="fas fa-brain"></i> Nguyên nhân của bạo lực học đường
        </button>
        
        <button class="option-btn" onclick="fetchAndShow('giaiphap.txt', 'Giải pháp khắc phục')">
            <i class="fas fa-hand-holding-heart"></i> Giải pháp cho bạo lực học đường
        </button>
        
        <button class="option-btn" onclick="fetchAndShow('dienramai.txt', 'Hệ quả tương lai')">
            <i class="fas fa-clock"></i> Sẽ ra sao nếu bạo lực diễn ra mãi?
        </button>
        
        <button class="option-btn" onclick="fetchAndShow('kobaoluc.txt', 'Môi trường lý tưởng')">
            <i class="fas fa-sun"></i> Sẽ ra sao nếu không có bạo lực?
        </button>
    </div>

    <div id="content-wrapper">
        <h2 id="content-title" style="margin-top:0; color: #4da6ff; border-bottom: 2px solid rgba(77, 166, 255, 0.3); padding-bottom: 15px;"></h2>
        <div id="text-body" class="scrollable-content"></div>
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> TRỞ LẠI MENU</button>
    </div>
</div>

<script>
    /* --- CANVAS BACKGROUND --- */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    const linkDistance = 150; 

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = 2;
            this.vx = (Math.random() - 0.5) * 0.8;
            this.vy = (Math.random() - 0.5) * 0.8;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    function init() {
        particles = [];
        for (let i = 0; i < 90; i++) particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            const p1 = particles[i]; p1.update(); p1.draw();
            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const dx = p1.x - p2.x; const dy = p1.y - p2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < linkDistance) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.8 - dist/linkDistance})`; 
                    ctx.lineWidth = 0.8; ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animate);
    }
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); });
    init(); animate();

    /* --- LOGIC XỬ LÝ NỘI DUNG VÀ ĐỊNH DẠNG --- */
    const menu = document.getElementById('menu');
    const wrapper = document.getElementById('content-wrapper');
    const textBody = document.getElementById('text-body');
    const titleTag = document.getElementById('content-title');

    function parseContent(text) {
        // 1. Xử lý link ảnh trước: tìm các link kết thúc bằng jpg, png, gif, webp, jpeg
        // Regex này tìm các URL ảnh đứng độc lập hoặc trong văn bản
        const imageRegex = /(https?:\/\/[^\s]+?\.(?:jpg|jpeg|png|gif|webp))/gi;
        let formatted = text.replace(imageRegex, '<img src="$1" class="content-image" alt="Hình ảnh minh họa">');

        // 2. Xử lý các định dạng văn bản
        formatted = formatted
            .replace(/\*\*(.*?)\*\*/g, '<span class="custom-bold">$1</span>') // In đậm
            .replace(/--(.*?)--/g, '<span class="custom-underline">$1</span>') // Gạch chân
            .replace(/{{(.*?)}}/g, '<span class="custom-highlight">$1</span>'); // Tô đậm nền
            
        return formatted;
    }

    async function fetchAndShow(file, title) {
        menu.classList.add('slide-out');
        
        let content = "";
        try {
            const response = await fetch(file);
            content = response.ok ? await response.text() : `Không tìm thấy file: ${file}`;
        } catch (e) {
            content = "Lỗi kết nối file. Đây là mẫu định dạng:\n\n**Tiêu đề in đậm**\n--Dòng gạch chân--\n{{Nội dung quan trọng}}\n\nLink ảnh mẫu:\nhttps://images.unsplash.com/photo-1543269865-cbf427effbad?w=800";
        }

        setTimeout(() => {
            titleTag.innerText = title;
            textBody.innerHTML = parseContent(content);
            textBody.scrollTop = 0; 
            wrapper.classList.add('active');
        }, 700);
    }

    function goBack() {
        wrapper.classList.remove('active');
        setTimeout(() => {
            menu.classList.remove('slide-out');
        }, 600);
    }
</script>
</body>
</html>
