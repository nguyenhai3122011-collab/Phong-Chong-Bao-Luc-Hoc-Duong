<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Hiểu Thêm Về Bạo Lực Học Đường</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            height: 100vh;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #app-container {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Menu chính - Tối ưu độ rộng linh hoạt */
        .menu-container {
            text-align: center;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.75);
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            z-index: 10;
            width: 100%;
            max-width: 500px; /* Giới hạn trên máy tính */
        }

        .menu-container.slide-out {
            transform: translateX(-150%) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .option-btn {
            display: block;
            width: 100%;
            /* min-width: 450px; <-- Xóa cái này để không bị tràn màn hình điện thoại */
            margin: 10px auto;
            padding: 15px 20px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
            box-sizing: border-box;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4da6ff;
            transform: translateX(10px);
            color: #fff;
            box-shadow: -5px 0 15px rgba(77, 166, 255, 0.3);
        }

        .option-btn i {
            margin-right: 12px;
            color: #4da6ff;
        }

        /* KHUNG CỬA SỔ THÔNG TIN */
        #content-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(150%, -50%);
            width: 95%; 
            max-width: 1100px;
            background: rgba(10, 10, 10, 0.98);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 80px rgba(0,0,0,1);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            box-sizing: border-box;
        }

        #content-wrapper.active {
            transform: translate(-50%, -50%);
            opacity: 1;
        }

        #content-title {
            font-size: 1.4rem;
            margin-top: 0;
            color: #4da6ff;
            border-bottom: 2px solid rgba(77, 166, 255, 0.2);
            padding-bottom: 15px;
        }

        .scrollable-content {
            overflow-y: auto;
            padding-right: 10px;
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #f0f0f0;
            white-space: pre-wrap;
            text-align: justify;
        }

        /* ẢNH TỰ THÍCH NGHI */
        .content-image {
            display: block;
            width: 100%;
            max-width: 600px;
            height: auto;
            margin: 20px auto;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .back-btn {
            align-self: flex-start;
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* --- MEDIA QUERIES: ĐIỀU CHỈNH CHO MÁY TÍNH --- */
        @media (min-width: 768px) {
            h2 { font-size: 2rem; }
            .option-btn { font-size: 1.2rem; padding: 20px 25px; }
            #content-wrapper { padding: 50px; width: 92%; }
            #content-title { font-size: 2.2rem; }
            .scrollable-content { font-size: 1.35rem; padding-right: 25px; }
            .back-btn { font-size: 1rem; padding: 14px 32px; }
            .content-image { max-width: 55%; }
        }

        /* Định dạng nội dung */
        .custom-bold { font-weight: 800; color: #fff; }
        .custom-underline { text-decoration: underline; text-underline-offset: 6px; }
        .custom-highlight { 
            background: linear-gradient(90deg, #0056b3, #007bff);
            padding: 2px 8px; 
            border-radius: 6px; 
            color: white; 
        }

        .scrollable-content::-webkit-scrollbar { width: 6px; }
        .scrollable-content::-webkit-scrollbar-thumb { background: #4da6ff; border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="app-container">
    <div class="menu-container" id="menu">
        <h2><i class="fas fa-shield-alt"></i> Tìm Hiểu Thêm</h2>
        <button class="option-btn" onclick="fetchAndShow('now.txt', 'Hiện trạng bạo lực học đường')">
            <i class="fas fa-bullhorn"></i> Hiện trạng bạo lực
        </button>
        <button class="option-btn" onclick="fetchAndShow('why.txt', 'Nguyên nhân bạo lực')">
            <i class="fas fa-brain"></i> Nguyên nhân bạo lực
        </button>
        <button class="option-btn" onclick="fetchAndShow('giaiphap.txt', 'Giải pháp khắc phục')">
            <i class="fas fa-hand-holding-heart"></i> Giải pháp khắc phục
        </button>
        <button class="option-btn" onclick="fetchAndShow('dienramai.txt', 'Hệ quả tương lai')">
            <i class="fas fa-clock"></i> Hệ quả tương lai
        </button>
        <button class="option-btn" onclick="fetchAndShow('kobaoluc.txt', 'Môi trường lý tưởng')">
            <i class="fas fa-sun"></i> Môi trường lý tưởng
        </button>
    </div>

    <div id="content-wrapper">
        <h2 id="content-title"></h2>
        <div id="text-body" class="scrollable-content"></div>
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> TRỞ LẠI</button>
    </div>
</div>

<script>
    /* --- CANVAS BACKGROUND --- */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = 2;
            this.vx = (Math.random() - 0.5) * 0.8;
            this.vy = (Math.random() - 0.5) * 0.8;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    function init() {
        particles = [];
        const count = window.innerWidth < 768 ? 40 : 90; // Giảm hạt trên mobile cho mượt
        for (let i = 0; i < count; i++) particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const linkDistance = 150;
        for (let i = 0; i < particles.length; i++) {
            const p1 = particles[i]; p1.update(); p1.draw();
            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const dx = p1.x - p2.x; const dy = p1.y - p2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < linkDistance) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.8 - dist/linkDistance})`; 
                    ctx.lineWidth = 0.8; ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animate);
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); animate();

    /* --- LOGIC XỬ LÝ --- */
    const menu = document.getElementById('menu');
    const wrapper = document.getElementById('content-wrapper');
    const textBody = document.getElementById('text-body');
    const titleTag = document.getElementById('content-title');

    function parseContent(text) {
        const imageRegex = /(https?:\/\/[^\s]+?\.(?:jpg|jpeg|png|gif|webp))/gi;
        let formatted = text.replace(imageRegex, '<img src="$1" class="content-image" alt="Hình ảnh">');
        formatted = formatted
            .replace(/\*\*(.*?)\*\*/g, '<span class="custom-bold">$1</span>')
            .replace(/--(.*?)--/g, '<span class="custom-underline">$1</span>')
            .replace(/{{(.*?)}}/g, '<span class="custom-highlight">$1</span>');
        return formatted;
    }

    async function fetchAndShow(file, title) {
        menu.classList.add('slide-out');
        let content = "";
        try {
            const response = await fetch(file);
            content = response.ok ? await response.text() : `Không tìm thấy nội dung.`;
        } catch (e) {
            content = "Lỗi kết nối dữ liệu.";
        }

        setTimeout(() => {
            titleTag.innerText = title;
            textBody.innerHTML = parseContent(content);
            textBody.scrollTop = 0; 
            wrapper.classList.add('active');
        }, 700);
    }

    function goBack() {
        wrapper.classList.remove('active');
        setTimeout(() => { menu.classList.remove('slide-out'); }, 600);
    }
</script>
</body>
</html>
